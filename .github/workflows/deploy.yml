name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production  # 确保使用生产环境配置
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    
    - name: 安装依赖
      run: |
        cd frontend
        echo "当前目录: $(pwd)"
        echo "Node版本: $(node --version)"
        echo "npm版本: $(npm --version)"
        
        # 安装依赖（不使用缓存避免问题）
        npm install --no-audit --no-fund --loglevel=verbose
        
        echo "依赖安装完成"
    
    - name: 构建项目
      run: |
        cd frontend
        echo "开始构建..."
        echo "NODE_ENV: $NODE_ENV"
        
        # 构建项目
        npm run build
        
        echo "构建完成，检查输出:"
        ls -la dist/
        echo ""
        echo "检查基础路径配置:"
        if grep -q "/agent-learning-platform/" dist/index.html; then
          echo "✅ 基础路径配置正确"
        else
          echo "❌ 基础路径配置错误"
          exit 1
        fi
    
    - name: 上传构建产物
      uses: actions/upload-pages-artifact@v3
      with:
        path: frontend/dist
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: 部署到GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
    
    - name: 验证部署
      run: |
        echo "✅ 部署完成！"
        echo ""
        echo "📊 部署详情:"
        echo "- 仓库: ${{ github.repository }}"
        echo "- 分支: master"
        echo "- 构建时间: $(date)"
        echo "- Node.js版本: 24"
        echo ""
        echo "🔗 访问地址:"
        echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        echo ""
        echo "⏳ 首次部署可能需要1-2分钟生效"
        echo "📱 查看状态: https://github.com/${{ github.repository }}/settings/pages"