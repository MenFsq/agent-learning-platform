## 环境配置

### 前端环境变量 (.env.production)
```env
VITE_API_URL=http://your-server:8000/api
VITE_APP_TITLE=Agent Learning Platform
VITE_APP_VERSION=1.0.0
```

### 后端环境变量 (.env)
```env
DATABASE_URL=postgresql://user:password@localhost:5432/agent_platform
REDIS_URL=redis://localhost:6379/0
DEBUG=False
ENVIRONMENT=production
ALLOWED_HOSTS=localhost,127.0.0.1,your-domain.com
```

## 监控和日志

### 查看服务状态
```bash
# 查看容器状态
docker-compose ps

# 查看日志
docker-compose logs -f

# 健康检查
curl http://localhost:8000/health
```

### 常用命令
```bash
# 停止服务
docker-compose down

# 重启服务
docker-compose restart

# 更新服务
docker-compose pull && docker-compose up -d

# 查看资源使用
docker stats
```

## 故障排除

### 前端无法访问
1. 检查 GitHub Pages 设置
2. 验证构建是否成功
3. 检查浏览器控制台错误

### 后端无法启动
1. 检查端口是否被占用
2. 查看 Docker 日志: `docker-compose logs backend`
3. 检查数据库连接

### API 连接失败
1. 确认后端服务正在运行
2. 检查网络连接
3. 验证 CORS 配置

## 联系方式
如有问题，请联系项目维护者。

---
*本报告由小老虎 🐯 自动部署系统生成*
EOF
        
        echo "📄 部署报告已生成: DEPLOYMENT-REPORT.md"
    
    - name: 上传部署报告
      uses: actions/upload-artifact@v4
      with:
        name: deployment-report
        path: DEPLOYMENT-REPORT.md
        retention-days: 30