name: Fullstack Deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 前端部署到 GitHub Pages
  frontend-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: 安装前端依赖
      run: |
        cd frontend
        npm ci --no-audit --no-fund
    
    - name: 构建前端
      env:
        NODE_ENV: production
      run: |
        cd frontend
        npm run build
        
        # 验证构建
        echo "✅ 前端构建完成"
        echo "📁 构建目录大小: $(du -sh dist | cut -f1)"
    
    - name: 上传到GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: frontend/dist
  
    - name: 部署到GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
  
  # 后端构建和测试
  backend-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    
    - name: 安装后端依赖
      run: |
        cd backend
        pip install -r requirements.txt
    
    - name: 运行后端测试
      run: |
        cd backend
        # 如果有测试就运行
        if [ -d "tests" ]; then
          python -m pytest tests/ -v
        else
          echo "⚠️  没有测试目录，跳过测试"
        fi
    
    - name: 构建Docker镜像
      run: |
        cd backend
        docker build -t agent-platform-backend:${{ github.sha }} .
    
    - name: 创建部署包
      run: |
        # 创建部署配置
        mkdir -p deploy
        
        # 复制后端代码
        cp -r backend/* deploy/
        
        # 创建启动脚本
        cat > deploy/start.sh << 'EOF'
#!/bin/bash
set -e

# 激活虚拟环境
if [ -d "venv" ]; then
    source venv/bin/activate
fi

# 安装依赖
pip install -r requirements.txt

# 启动服务
python start_simple.py
EOF
        
        chmod +x deploy/start.sh
        
        # 创建Docker Compose配置
        cat > deploy/docker-compose.yml << 'EOF'
version: '3.8'

services:
  backend:
    build: .
    container_name: agent-platform-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/agent_platform
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
      - ENVIRONMENT=production
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: agent-platform-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=agent_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agent-platform-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
EOF
        
        # 压缩部署包
        tar -czf backend-deploy.tar.gz deploy/
    
    - name: 上传后端部署包
      uses: actions/upload-artifact@v4
      with:
        name: backend-deploy
        path: backend-deploy.tar.gz
        retention-days: 30
  
  # 部署完成通知
  deploy-notify:
    runs-on: ubuntu-latest
    needs: [frontend-deploy, backend-build]
    
    steps:
    - name: 下载后端部署包
      uses: actions/download-artifact@v4
      with:
        name: backend-deploy
    
    - name: 发送部署报告
      run: |
        echo "🎉 Agent Learning Platform 全栈部署完成！"
        echo ""
        echo "📊 部署摘要:"
        echo "- 前端: 已部署到 GitHub Pages"
        echo "- 后端: 构建完成，部署包已生成"
        echo "- 时间: $(date)"
        echo ""
        echo "🔗 前端访问地址:"
        echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        echo ""
        echo "⚙️  后端部署说明:"
        echo "1. 下载 backend-deploy.tar.gz"
        echo "2. 解压: tar -xzf backend-deploy.tar.gz"
        echo "3. 进入目录: cd deploy"
        echo "4. 启动服务: docker-compose up -d"
        echo ""
        echo "📋 后端API地址: http://your-server:8000"
        echo "📁 前端配置后端API: 修改 frontend/.env.production"
        echo ""
        echo "🐯 由小老虎自动部署系统生成"
    
    - name: 创建部署文档
      run: |
        cat > DEPLOYMENT-REPORT.md << 'EOF'
# 部署报告

## 部署信息
- **项目**: Agent Learning Platform
- **部署时间**: $(date)
- **提交**: ${{ github.sha }}
- **分支**: ${{ github.ref_name }}

## 前端部署
✅ 已成功部署到 GitHub Pages

**访问地址**:
https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

**构建信息**:
- Node.js: 24
- 构建环境: production
- 构建时间: $(date)

## 后端部署
