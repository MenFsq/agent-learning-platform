name: CI - 代码质量检查

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
        
    - name: 代码格式检查
      run: |
        echo "## 代码格式检查"
        echo "检查文件编码..."
        find . -name "*.md" -type f | xargs file -i | grep -v "utf-8" && exit 1 || echo "✓ 所有Markdown文件使用UTF-8编码"
        
        echo "检查行尾符..."
        find . -name "*.md" -type f -exec grep -l $'\r' {} \; && echo "⚠️ 发现Windows行尾符" || echo "✓ 行尾符检查通过"
        
    - name: 文档链接检查
      run: |
        echo "## 文档链接检查"
        echo "检查README.md中的链接..."
        if grep -q "http" README.md; then
          echo "✓ README.md包含外部链接"
        else
          echo "⚠️ README.md缺少外部链接"
        fi
        
    - name: 文件结构检查
      run: |
        echo "## 项目结构检查"
        echo "检查必要文件是否存在..."
        
        required_files=(
          "README.md"
          "ARCHITECTURE.md"
          "CONTRIBUTING.md"
          "LICENSE"
          ".gitignore"
        )
        
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file 存在"
          else
            echo "❌ $file 缺失"
            exit 1
          fi
        done
        
        echo "检查目录结构..."
        required_dirs=(
          ".github"
          "frontend"
          "backend"
          "docs"
        )
        
        for dir in "${required_dirs[@]}"; do
          if [ -d "$dir" ]; then
            echo "✓ $dir/ 目录存在"
          else
            echo "❌ $dir/ 目录缺失"
            exit 1
          fi
        done
        
    - name: 提交信息检查
      if: github.event_name == 'pull_request'
      run: |
        echo "## 提交信息检查"
        echo "检查PR标题格式..."
        PR_TITLE="${{ github.event.pull_request.title }}"
        
        # 检查提交类型前缀
        if [[ $PR_TITLE =~ ^(feat|fix|docs|style|refactor|test|chore|perf|build|ci|revert)(\(.*\))?: ]]; then
          echo "✓ PR标题格式正确: $PR_TITLE"
        else
          echo "❌ PR标题格式不正确，应使用: type(scope): description"
          echo "   例如: feat(frontend): 添加用户登录界面"
          echo "   可用类型: feat, fix, docs, style, refactor, test, chore, perf, build, ci, revert"
          exit 1
        fi
        
    - name: 安全检查
      run: |
        echo "## 安全检查"
        echo "检查敏感信息..."
        
        # 检查是否包含敏感信息
        sensitive_patterns=(
          "password="
          "secret="
          "token="
          "api_key="
          "private_key"
        )
        
        for pattern in "${sensitive_patterns[@]}"; do
          if grep -r -i "$pattern" . --include="*.md" --include="*.yml" --include="*.yaml" --include="*.json" --include="*.js" --include="*.ts" --include="*.py" 2>/dev/null; then
            echo "⚠️ 发现可能的敏感信息模式: $pattern"
            echo "请检查上述文件是否包含敏感信息"
          fi
        done
        
    - name: 生成检查报告
      run: |
        echo "## CI检查完成"
        echo "✅ 所有基础检查通过"
        echo ""
        echo "📊 检查总结:"
        echo "- 文件结构: ✅ 完整"
        echo "- 代码格式: ✅ 通过"  
        echo "- 文档链接: ✅ 正常"
        echo "- 提交信息: ✅ 规范"
        echo "- 安全检查: ✅ 通过"
        echo ""
        echo "🚀 项目状态良好，可以继续开发！"