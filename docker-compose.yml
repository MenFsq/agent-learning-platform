version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: alp-backend
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/agent_learning_platform.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-true}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - CORS_ORIGINS=["*"]
    volumes:
      # 持久化数据（Agent 记忆、对话历史）
      - alp_data:/app/data
      # 开发模式：挂载源码实现热重载（可选）
      # - ./backend/src:/app/src
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: alp-frontend
    ports:
      - "5174:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  alp_data:
